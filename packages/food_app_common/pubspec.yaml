name: food_app_common
description: "Shared boot/analytics/web-shell/ATT modules for white-label apps."
version: 0.0.1
homepage:

environment:
  sdk: ^3.11.5
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  dio: any
  connectivity_plus: any
  webview_flutter: any
  package_info_plus: any
  device_info_plus: any
  logger: any
  appsflyer_sdk: any
  adjust_sdk: any
  app_tracking_transparency: any
  url_launcher: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

